<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e22"/>
      <stop offset="55%" style="stop-color:#0d1638"/>
      <stop offset="100%" style="stop-color:#0f0b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6fe7ff"/>
      <stop offset="100%" style="stop-color:#c8a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="15%" r="55%">
      <stop offset="0%" style="stop-color:#6fe7ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#080e22;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="980" y="200" font-size="200" fill="rgba(111,231,255,0.04)" font-family="Georgia,serif" text-anchor="middle">◆</text>
  <!-- Logo -->
  <text x="88" y="240" font-size="50" fill="url(#accent)" font-family="Georgia,serif">◆</text>
  <text x="148" y="240" font-size="20" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-weight="500" letter-spacing="2">DIAMOND PAINTER</text>
  <!-- Tag -->
  <rect x="88" y="262" width="210" height="30" rx="15" fill="rgba(111,231,255,0.1)" stroke="rgba(111,231,255,0.22)" stroke-width="1"/>
  <text x="193" y="282" font-size="12" fill="#6fe7ff" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">📸 보석십자수 도안 제작</text>
  <!-- Main title Korean -->
  <text x="88" y="378" font-size="52" fill="rgba(255,255,255,0.95)" font-family="'Noto Sans KR',system-ui,sans-serif" font-weight="700">사진으로 보석십자수</text>
  <text x="88" y="448" font-size="52" fill="url(#accent)" font-family="'Noto Sans KR',system-ui,sans-serif" font-weight="700">도안 무료 제작</text>
  <!-- Subtitle -->
  <text x="88" y="512" font-size="22" fill="rgba(255,255,255,0.55)" font-family="'Noto Sans KR',system-ui,sans-serif" font-weight="300">DMC 코드 자동 매칭 · 설치 없이 브라우저에서</text>
  <!-- Bottom -->
  <rect x="88" y="556" width="80" height="2" fill="url(#accent)" opacity="0.6"/>
  <text x="88" y="592" font-size="16" fill="rgba(255,255,255,0.3)" font-family="system-ui,sans-serif">diamondpainter.app · 완전 무료 · 회원가입 불필요</text>
</svg>
