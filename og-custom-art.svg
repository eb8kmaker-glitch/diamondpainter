<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e22"/>
      <stop offset="55%" style="stop-color:#0d1638"/>
      <stop offset="100%" style="stop-color:#0f0b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6fe7ff"/>
      <stop offset="100%" style="stop-color:#c8a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="15%" r="55%">
      <stop offset="0%" style="stop-color:#6fe7ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#080e22;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="980" y="180" font-size="200" fill="rgba(111,231,255,0.04)" font-family="Georgia,serif" text-anchor="middle">◆</text>
  <!-- Logo -->
  <text x="88" y="248" font-size="56" fill="url(#accent)" font-family="Georgia,serif">◆</text>
  <text x="152" y="248" font-size="22" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-weight="500" letter-spacing="2">DIAMOND PAINTER</text>
  <!-- Tag -->
  <rect x="88" y="270" width="200" height="32" rx="16" fill="rgba(111,231,255,0.1)" stroke="rgba(111,231,255,0.22)" stroke-width="1"/>
  <text x="188" y="291" font-size="13" fill="#6fe7ff" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">◆ CUSTOM DIAMOND ART</text>
  <!-- Main title -->
  <text x="88" y="386" font-size="54" fill="rgba(255,255,255,0.95)" font-family="Georgia,serif" font-weight="600">Turn Any Photo Into</text>
  <text x="88" y="452" font-size="54" fill="url(#accent)" font-family="Georgia,serif" font-style="italic">Custom Diamond Art</text>
  <!-- Subtitle -->
  <text x="88" y="516" font-size="23" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-weight="300">457 DMC colors · 40+ canvas sizes · Free, no sign-up</text>
  <!-- Bottom -->
  <rect x="88" y="558" width="80" height="2" fill="url(#accent)" opacity="0.6"/>
  <text x="88" y="594" font-size="16" fill="rgba(255,255,255,0.3)" font-family="system-ui,sans-serif">diamondpainter.app</text>
</svg>
