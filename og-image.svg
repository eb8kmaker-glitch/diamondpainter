<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080e22"/>
      <stop offset="55%" style="stop-color:#0d1638"/>
      <stop offset="100%" style="stop-color:#0f0b36"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6fe7ff"/>
      <stop offset="100%" style="stop-color:#c8a6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#6fe7ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#080e22;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Decorative diamonds -->
  <text x="980" y="180" font-size="200" fill="rgba(111,231,255,0.04)" font-family="Georgia,serif" text-anchor="middle">◆</text>
  <text x="1100" y="500" font-size="120" fill="rgba(200,166,255,0.04)" font-family="Georgia,serif" text-anchor="middle">◆</text>
  <!-- Logo diamond -->
  <text x="88" y="248" font-size="56" fill="url(#accent)" font-family="Georgia,serif">◆</text>
  <!-- Brand -->
  <text x="152" y="248" font-size="22" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-weight="500" letter-spacing="2">DIAMOND PAINTER</text>
  <!-- Main title -->
  <text x="88" y="360" font-size="58" fill="rgba(255,255,255,0.95)" font-family="Georgia,serif" font-weight="600">Custom Diamond Painting</text>
  <text x="88" y="432" font-size="58" fill="url(#accent)" font-family="Georgia,serif" font-style="italic">Pattern Maker</text>
  <!-- Subtitle -->
  <text x="88" y="508" font-size="24" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-weight="300">Turn any photo into diamond art — free, in your browser</text>
  <!-- Bottom line -->
  <rect x="88" y="560" width="80" height="2" fill="url(#accent)" opacity="0.6"/>
  <text x="88" y="596" font-size="16" fill="rgba(255,255,255,0.3)" font-family="system-ui,sans-serif">diamondpainter.app · Free · No sign-up required</text>
</svg>
